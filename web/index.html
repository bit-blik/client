<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Your BLIK ⇄ bitcoin Bridge">
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="bitblik">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <title>bitblik</title>
  <link rel="manifest" href="manifest.json">
<!--    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">-->
<!--    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">-->
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #ffffff;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    #splash-branding {
      position: fixed;
      left: 50%;
      top: calc(50% + 110px);
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #334155;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      z-index: 9999;
      text-align: center;
      padding: 0 16px;
    }

    .loader {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid #d7e3f3;
      border-top-color: #165ec9;
      animation: spin 0.9s linear infinite;
    }

    #loading-message {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    #loading-subtext {
      font-size: 12px;
      color: #64748b;
      max-width: 280px;
      line-height: 1.35;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 640px) {
      #splash-branding {
        top: calc(50% + 92px);
      }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }

    function isFlutterUiMounted() {
      return Boolean(
        document.querySelector("flutter-view") ||
          document.querySelector("flt-glass-pane") ||
          document.querySelector("flt-scene-host") ||
          document.querySelector("canvas.flt-canvas")
      );
    }

    function autoRemoveSplashWhenFlutterStarts() {
      if (isFlutterUiMounted()) {
        removeSplashFromWeb();
        return;
      }

      const observer = new MutationObserver(function () {
        if (isFlutterUiMounted()) {
          observer.disconnect();
          clearInterval(pollId);
          removeSplashFromWeb();
        }
      });

      observer.observe(document.body, { childList: true, subtree: true });

      const pollId = setInterval(function () {
        if (isFlutterUiMounted()) {
          observer.disconnect();
          clearInterval(pollId);
          removeSplashFromWeb();
        }
      }, 300);

      setTimeout(function () {
        observer.disconnect();
        clearInterval(pollId);
      }, 120000);
    }

    window.addEventListener("DOMContentLoaded", function () {
      const message = document.getElementById("loading-message");
      const subtext = document.getElementById("loading-subtext");

      autoRemoveSplashWhenFlutterStarts();

      setTimeout(function () {
        if (message) message.textContent = "Still loading...";
        if (subtext) {
          subtext.textContent =
            "Your connection seems slow. Flutter assets are still downloading.";
        }
      }, 7000);

      setTimeout(function () {
        if (message) message.textContent = "Almost there...";
      }, 15000);
    });
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>

  <div id="splash-branding" role="status" aria-live="polite">
    <div class="loader" aria-hidden="true"></div>
    <div id="loading-message">Loading BitBlik...</div>
    <div id="loading-subtext">Only first time it will need to download app resources.</div>
  </div>
  
  
  
  
  <!-- Load runtime configuration for group links -->
  <script src="config.js"></script>
  
  <script src="flutter_bootstrap.js" async=""></script>



</body></html>
