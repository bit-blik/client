server {
    listen 80;
    server_name localhost; # Adjust if needed for specific domain

    # Set document root to where Flutter web files will be copied
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Ensure app shell is always served as HTML.
    location = / {
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
        try_files /index.html =404;
        default_type text/html;
    }

    location = /index.html {
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
        default_type text/html;
    }

    location / {
        # First attempt to serve request as file, then
        # as directory, then fall back to displaying index.html
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
        try_files $uri $uri/ /index.html;
    }

    # Worker compatibility alias used by some drift/sqflite setups.
    location = /drift_worker.js {
        try_files /drift_worker.dart.js =404;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /main.dart.mjs {
        try_files $uri =404;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Do not fall back to index.html for static assets.
    location ~* \.(js|mjs|wasm|map|json|png|jpg|jpeg|gif|svg|ico|ttf|otf|woff|woff2)$ {
        try_files $uri =404;
    }

    # Ensure modern web build artifacts are served with correct MIME types
    location ~* \.mjs$ {
        types { application/javascript mjs; }
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.wasm$ {
        types { application/wasm wasm; }
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /robots.txt {
        alias /usr/share/nginx/html/robots.txt;
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }

    # Serve splash images locally (no proxy needed since files are in the container)
    location /splash/ {
        # Files are already copied to /usr/share/nginx/html from the Flutter build
        # No need for proxy_pass since we have the files locally
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /.well-known/assetlinks.json {
        alias /usr/share/nginx/html/.well-known/assetlinks.json;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*";
    }

    location = /.well-known/apple-app-site-association {
        alias /usr/share/nginx/html/.well-known/apple-app-site-association;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*";
    }

    location /.well-known/sources/ {
        alias /usr/share/nginx/html/.well-known/sources/;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=3600";
    }

    # Optional: Basic error page handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html; # Or a different location for error pages
    }

    # Optional: Enable gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
